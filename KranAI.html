<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KranAI</title>

<style>

body{
    background:#111827;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

/* Üst bar */

.header{
    height:70px;
    background:#0b1220;
    border-bottom:1px solid #263244;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 40px;
}

.logo-area{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo{
    width:42px;
    height:42px;
    background:#8b5cf6;
    color:white;
    font-size:30px;
    font-weight:bold;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.brand{
    font-size:28px;
    font-weight:bold;
}

.profile{
    width:42px;
    height:42px;
    border-radius:50%;
    background:#1f2937;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
}

#fullscreenBtn{
    background:#1f2937;
    color:white;
    border:none;
    border-radius:10px;
    width:42px;
    height:42px;
    cursor:pointer;
    font-size:18px;
}

#fullscreenBtn:hover{
    background:#374151;
}

.container{
    width:80%;
    max-width:900px;
    margin:50px auto;
}

h1{
    color:#8b5cf6;
}

.chat-box{
    background:#1f2937;
    height:400px;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.input-area{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#8b5cf6;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

.message{
    max-width:70%;
    padding:10px 14px;
    margin:8px 0;
    border-radius:15px;
    animation:messageShow 0.3s ease;
}

@keyframes messageShow{
    from{opacity:0; transform:translateY(15px);}
    to{opacity:1; transform:translateY(0);}
}

.user-message{
    background:#8b5cf6;
    margin-left:auto;
}

.bot-message{
    background:#374151;
    margin-right:auto;
}

.dots span{
    animation:blink 1.4s infinite;
}

.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}

@keyframes blink{
    0%{opacity:0;}
    50%{opacity:1;}
    100%{opacity:0;}
}

.info-text{
    text-align:center;
    color:#9ca3af;
    font-size:13px;
    margin-top:12px;
}

.info-text span{
    color:#8b5cf6;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo-area">
        <div class="logo">K</div>
        <div class="brand">KranAI</div>
    </div>

    <div style="display:flex; gap:10px; align-items:center;">
        <button id="fullscreenBtn" onclick="toggleFullscreen()">🖥️</button>
        <div class="profile">👤</div>
    </div>
</div>

<div class="container">

    <h1>Krantex'in Sitesine Hoş Geldin!</h1>

    <p>KranAI senin için elinden geleni yapacak.</p>

    <div class="chat-box" id="chatBox">
        <div class="message bot-message">👋 Merhaba! Ben KranAI.</div>
    </div>

    <div class="input-area">
        <input id="msg" type="text" placeholder="Mesaj yaz">
        <button onclick="send()">Gönder</button>
    </div>

    <div class="info-text">
        KranAI hata yapabilir.
        <span id="moreInfo" onclick="changeText()">Daha fazla bilgi için tıklayın</span>
    </div>

</div>

<script>

function send(){

    let mesaj = document.getElementById("msg").value.trim();
    if(mesaj === "") return;

    let chatBox = document.getElementById("chatBox");

    // USER MESSAGE (güvenli)
    let userDiv = document.createElement("div");
    userDiv.className = "message user-message";
    userDiv.innerText = mesaj;
    chatBox.appendChild(userDiv);

    let msg = mesaj.toLowerCase();

    let cevap = "Bunu anlayamadım 🤔";

    if(msg.includes("arkadaş") && msg.includes("olalım")){
        cevap = "ten rengin ne? 😊";
    }
    else if(msg.includes("merhaba")){
        cevap = "Merhaba! 👋";
    }
    else if(msg.includes("nasılsın")){
        cevap = "İyiyim 😄 Sen nasılsın?";
    }
    else if(msg.includes("adın ne")){
        cevap = "Ben KranAI 🤖";
    }
    else if(msg.includes("kaç yaşındasın")){
        cevap = "Ben bir yapay zekayım, benim bir yaşım yok :) ";
    }
    else if(msg.includes("ne yapıyorsun")){
        cevap = "Burada sadece seninle konuşuyorum. Zaten yapabileceğim tek şey bu... ";
    }
    else if(msg.includes("ne yapıyon")){
        cevap = "Burada sadece seninle konuşuyorum. Zaten yapabiliceğim tek şey bu... ";
    }
    

    // typing anim
    let typing = document.createElement("div");
    typing.className = "message bot-message";
    typing.innerHTML = `
        🤖 KranAI yazıyor
        <span class="dots">
            <span>.</span><span>.</span><span>.</span>
        </span>
    `;

    chatBox.appendChild(typing);
    chatBox.scrollTop = chatBox.scrollHeight;

    setTimeout(() => {
        typing.remove();

        let botDiv = document.createElement("div");
        botDiv.className = "message bot-message";
        botDiv.innerText = "🤖 " + cevap;

        chatBox.appendChild(botDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

    }, 1200);

    document.getElementById("msg").value = "";
    document.getElementById("msg").focus();
}

document.getElementById("msg").addEventListener("keydown", function(e){
    if(e.key === "Enter") send();
});

function changeText(){
    let yazi = document.getElementById("moreInfo");
    yazi.innerText = "Cidden tıkladın mı lan bir de?";

    setTimeout(() => {
        yazi.innerText = "Daha fazla bilgi için tıklayın";
    }, 5000);
}

function toggleFullscreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
        document.getElementById("fullscreenBtn").innerText = "❌";
    }else{
        document.exitFullscreen();
        document.getElementById("fullscreenBtn").innerText = "🖥️";
    }
}

</script>

</body>
</html>
